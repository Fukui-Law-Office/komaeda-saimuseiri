<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5BC0EB"/>
      <stop offset="100%" stop-color="#3A9BD9"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8C542"/>
      <stop offset="100%" stop-color="#8DB63C"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#blue)"/>
  <!-- Green area (bottom-right) -->
  <path d="M60 100 Q60 190 100 195 Q190 195 195 100 Q195 60 160 40 L160 100 Q160 140 120 140 L60 140 Z" fill="url(#green)" clip-path="url(#circle-clip)"/>
  <!-- White F-shape / bracket -->
  <rect x="48" y="35" width="18" height="110" rx="4" fill="#fff"/>
  <rect x="48" y="35" width="65" height="18" rx="4" fill="#fff"/>
  <rect x="48" y="80" width="50" height="16" rx="4" fill="#fff"/>
  <!-- Pink dot -->
  <circle cx="128" cy="108" r="14" fill="#E8729A"/>
</svg>
